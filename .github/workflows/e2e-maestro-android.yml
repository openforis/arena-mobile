name: E2E Maestro Android

on: [pull_request]

jobs:
  e2e-tests-maestro-android:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn
          always-auth: true
          auth-token: ${{secrets.ACCESS_TOKEN}}
          registry-url: "https://npm.pkg.github.com"
          scope: "@openforis"

      - name: Enable Corepack
        run: corepack enable

      - name: Yarn
        run: yarn
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Build the APK FIRST (No emulator yet)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"
      - name: Build Android APK
        run: |
          npx expo prebuild --platform android
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            -Dhttp.keepAlive=false \
            -Dmaven.wagon.http.pool=false \
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Now start the Emulator and run Maestro
      - name: Run Maestro Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ARENA_SERVER_URL: ${{secrets.ARENA_SERVER_URL}}
          ARENA_SERVER_USERNAME: ${{secrets.ARENA_SERVER_USERNAME}}
          ARENA_SERVER_PASSWORD: ${{secrets.ARENA_SERVER_PASSWORD}}
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim
          # Increase timeout because software-rendering is slow
          emulator-boot-timeout: 900
          script: |
            echo "Waiting for emulator to settle..."
            adb wait-for-device

            echo "Waiting for system to stabilize..."
            sleep 60

            echo "Installing APK..."
            # Use -r to replace if exists, -t for test packages (Expo debug builds need this)
            adb install -r -t android/app/build/outputs/apk/debug/app-debug.apk

            echo "Running Maestro..."
            # Give the OS 30 seconds to 'breathe' after installation
            sleep 30

            maestro test e2e/maestro/allTests.yaml -e APP_ID=org.openforis.arena_mobile -e ARENA_SERVER_URL=$ARENA_SERVER_URL -e ARENA_SERVER_USERNAME=$ARENA_SERVER_USERNAME -e ARENA_SERVER_PASSWORD=$ARENA_SERVER_PASSWORD
