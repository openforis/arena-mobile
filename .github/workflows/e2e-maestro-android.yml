name: E2E Maestro Android

on: [pull_request]

jobs:
  e2e-tests-maestro-android:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn
          always-auth: true
          auth-token: ${{secrets.ACCESS_TOKEN}}
          registry-url: "https://npm.pkg.github.com"
          scope: "@openforis"

      - name: Enable Corepack
        run: corepack enable

      - name: Yarn
        run: yarn
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Build the APK FIRST (No emulator yet)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Build Android APK
        run: |
          npx expo prebuild --platform android

          # Manually create the bundle and assets folder
          mkdir -p android/app/src/main/assets

          # Manually bundle the JS into the assets folder
          npx expo export:embed \
           --platform android \
            --dev false \
            --entry-file node_modules/expo/AppEntry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

          cd android
          ./gradlew assembleDebug --no-daemon
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ARENA_SERVER_URL: ${{secrets.ARENA_SERVER_URL}}
          ARENA_SERVER_USERNAME: ${{secrets.ARENA_SERVER_USERNAME}}
          ARENA_SERVER_PASSWORD: ${{secrets.ARENA_SERVER_PASSWORD}}
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -accel on -cores 2 -memory 2048
          disable-animations: true
          # Increase timeout because software-rendering is slow
          emulator-boot-timeout: 900
          script: |
            # 1. Ensure the ADB connection is bridged for the emulator
            adb reverse tcp:8081 tcp:8081

            echo "Waiting for emulator to settle..."
            adb wait-for-device

            echo "Waiting for system to stabilize..."
            sleep 60

            echo "Installing APK..."
            # Use -r to replace if exists, -t for test packages (Expo debug builds need this)
            adb install -r -t -g android/app/build/outputs/apk/debug/app-debug.apk

            echo "Running Maestro..."
            # Give the OS 30 seconds to 'breathe' after installation
            sleep 30

            maestro test e2e/maestro/allTests.yaml --format junit --output report.xml -e APP_ID=org.openforis.arena_mobile -e ARENA_SERVER_URL=$ARENA_SERVER_URL -e ARENA_SERVER_USERNAME=$ARENA_SERVER_USERNAME -e ARENA_SERVER_PASSWORD=$ARENA_SERVER_PASSWORD

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: ~/.maestro/tests/**/*

      - name: Store tests result
        uses: actions/upload-artifact@v4
        with:
          name: e2e_android_report
          path: |
            report.xml
